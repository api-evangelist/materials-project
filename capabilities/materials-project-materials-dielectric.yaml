naftiko: 1.0.0-alpha2
info:
  label: Materials Project API — Materials Dielectric
  description: 'Materials Project API — Materials Dielectric. 1 operations. Lead operation: Get DielectricDoc documents. Self-contained
    Naftiko capability covering one Materials Project business surface.'
  tags:
  - Materials Project
  - Materials Dielectric
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MATERIALS_PROJECT_API_KEY: MATERIALS_PROJECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: materials-project-materials-dielectric
    baseUri: ''
    description: Materials Project API — Materials Dielectric business capability. Self-contained, no shared references.
    resources:
    - name: materials-dielectric
      path: /materials/dielectric/
      operations:
      - name: searchmaterialsdielectricget
        method: GET
        description: Get DielectricDoc documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: material_ids
          in: query
          type: string
          description: Comma-separated list of material_id values to query on
        - name: e_total_max
          in: query
          type: string
          description: Maximum value for the total dielectric constant.
        - name: e_total_min
          in: query
          type: string
          description: Minimum value for the total dielectric constant.
        - name: e_ionic_max
          in: query
          type: string
          description: Maximum value for the ionic dielectric constant.
        - name: e_ionic_min
          in: query
          type: string
          description: Minimum value for the ionic dielectric constant.
        - name: e_electronic_max
          in: query
          type: string
          description: Maximum value for the electronic dielectric constant.
        - name: e_electronic_min
          in: query
          type: string
          description: Minimum value for the electronic dielectric constant.
        - name: n_max
          in: query
          type: string
          description: Maximum value for the refractive index.
        - name: n_min
          in: query
          type: string
          description: Minimum value for the refractive index.
        - name: _page
          in: query
          type: integer
          description: Page number to request (takes precedent over _limit and _skip).
        - name: _per_page
          in: query
          type: integer
          description: Number of entries to show per page (takes precedent over _limit and _skip). Limited to 1000.
        - name: _skip
          in: query
          type: integer
          description: Number of entries to skip in the search.
        - name: _limit
          in: query
          type: integer
          description: Max number of entries to return in a single query. Limited to 1000.
        - name: _fields
          in: query
          type: string
          description: 'Fields to project from DielectricDoc as a list of comma separated strings.                    Fields
            include: `builder_meta` `nsites` `elements` `nelements` `co'
        - name: _all_fields
          in: query
          type: boolean
          description: Include all fields.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.MATERIALS_PROJECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: materials-project-materials-dielectric-rest
    port: 8080
    description: REST adapter for Materials Project API — Materials Dielectric. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/materials/dielectric
      name: materials-dielectric
      description: REST surface for materials-dielectric.
      operations:
      - method: GET
        name: searchmaterialsdielectricget
        description: Get DielectricDoc documents
        call: materials-project-materials-dielectric.searchmaterialsdielectricget
        with:
          material_ids: rest.material_ids
          e_total_max: rest.e_total_max
          e_total_min: rest.e_total_min
          e_ionic_max: rest.e_ionic_max
          e_ionic_min: rest.e_ionic_min
          e_electronic_max: rest.e_electronic_max
          e_electronic_min: rest.e_electronic_min
          n_max: rest.n_max
          n_min: rest.n_min
          _page: rest._page
          _per_page: rest._per_page
          _skip: rest._skip
          _limit: rest._limit
          _fields: rest._fields
          _all_fields: rest._all_fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: materials-project-materials-dielectric-mcp
    port: 9090
    transport: http
    description: MCP adapter for Materials Project API — Materials Dielectric. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-dielectricdoc-documents
      description: Get DielectricDoc documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: materials-project-materials-dielectric.searchmaterialsdielectricget
      with:
        material_ids: tools.material_ids
        e_total_max: tools.e_total_max
        e_total_min: tools.e_total_min
        e_ionic_max: tools.e_ionic_max
        e_ionic_min: tools.e_ionic_min
        e_electronic_max: tools.e_electronic_max
        e_electronic_min: tools.e_electronic_min
        n_max: tools.n_max
        n_min: tools.n_min
        _page: tools._page
        _per_page: tools._per_page
        _skip: tools._skip
        _limit: tools._limit
        _fields: tools._fields
        _all_fields: tools._all_fields
      outputParameters:
      - type: object
        mapping: $.
