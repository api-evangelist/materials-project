naftiko: 1.0.0-alpha2
info:
  label: Materials Project API — Defect Tasks
  description: 'Materials Project API — Defect Tasks. 1 operations. Lead operation: Get DefectTaskDoc documents. Self-contained
    Naftiko capability covering one Materials Project business surface.'
  tags:
  - Materials Project
  - Defect Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MATERIALS_PROJECT_API_KEY: MATERIALS_PROJECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: materials-project-defect-tasks
    baseUri: ''
    description: Materials Project API — Defect Tasks business capability. Self-contained, no shared references.
    resources:
    - name: defects-tasks
      path: /defects/tasks/
      operations:
      - name: searchdefectstasksget
        method: GET
        description: Get DefectTaskDoc documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: formula
          in: query
          type: string
          description: Query by formula including anonymized formula or by including wild cards. A comma delimited string
            list of anonymous formulas or regular formulas can also be pr
        - name: chemsys
          in: query
          type: string
          description: A comma delimited string list of chemical systems. Wildcards for unknown elements only supported for
            single chemsys queries
        - name: elements
          in: query
          type: string
          description: Query by elements in the material composition as a comma-separated list
        - name: exclude_elements
          in: query
          type: string
          description: Query by excluded elements in the material composition as a comma-separated list
        - name: task_ids
          in: query
          type: string
          description: Comma-separated list of task_ids to query on
        - name: last_updated_min
          in: query
          type: string
          description: Minimum last updated UTC datetime
        - name: last_updated_max
          in: query
          type: string
          description: Maximum last updated UTC datetime
        - name: _page
          in: query
          type: integer
          description: Page number to request (takes precedent over _limit and _skip).
        - name: _per_page
          in: query
          type: integer
          description: Number of entries to show per page (takes precedent over _limit and _skip). Limited to 1000.
        - name: _skip
          in: query
          type: integer
          description: Number of entries to skip in the search.
        - name: _limit
          in: query
          type: integer
          description: Max number of entries to return in a single query. Limited to 1000.
        - name: _fields
          in: query
          type: string
          description: 'Fields to project from DefectTaskDoc as a list of comma separated strings.                    Fields
            include: `nsites` `elements` `nelements` `composition` `com'
        - name: _all_fields
          in: query
          type: boolean
          description: Include all fields.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.MATERIALS_PROJECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: materials-project-defect-tasks-rest
    port: 8080
    description: REST adapter for Materials Project API — Defect Tasks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/defects/tasks
      name: defects-tasks
      description: REST surface for defects-tasks.
      operations:
      - method: GET
        name: searchdefectstasksget
        description: Get DefectTaskDoc documents
        call: materials-project-defect-tasks.searchdefectstasksget
        with:
          formula: rest.formula
          chemsys: rest.chemsys
          elements: rest.elements
          exclude_elements: rest.exclude_elements
          task_ids: rest.task_ids
          last_updated_min: rest.last_updated_min
          last_updated_max: rest.last_updated_max
          _page: rest._page
          _per_page: rest._per_page
          _skip: rest._skip
          _limit: rest._limit
          _fields: rest._fields
          _all_fields: rest._all_fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: materials-project-defect-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Materials Project API — Defect Tasks. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-defecttaskdoc-documents
      description: Get DefectTaskDoc documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: materials-project-defect-tasks.searchdefectstasksget
      with:
        formula: tools.formula
        chemsys: tools.chemsys
        elements: tools.elements
        exclude_elements: tools.exclude_elements
        task_ids: tools.task_ids
        last_updated_min: tools.last_updated_min
        last_updated_max: tools.last_updated_max
        _page: tools._page
        _per_page: tools._per_page
        _skip: tools._skip
        _limit: tools._limit
        _fields: tools._fields
        _all_fields: tools._all_fields
      outputParameters:
      - type: object
        mapping: $.
