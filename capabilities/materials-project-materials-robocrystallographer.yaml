naftiko: 1.0.0-alpha2
info:
  label: Materials Project API — Materials Robocrystallographer
  description: 'Materials Project API — Materials Robocrystallographer. 2 operations. Lead operation: Get RobocrystallogapherDoc
    documents. Self-contained Naftiko capability covering one Materials Project business surface.'
  tags:
  - Materials Project
  - Materials Robocrystallographer
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MATERIALS_PROJECT_API_KEY: MATERIALS_PROJECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: materials-project-materials-robocrystallographer
    baseUri: ''
    description: Materials Project API — Materials Robocrystallographer business capability. Self-contained, no shared references.
    resources:
    - name: materials-robocrys
      path: /materials/robocrys/
      operations:
      - name: searchmaterialsrobocrysget
        method: GET
        description: Get RobocrystallogapherDoc documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: material_ids
          in: query
          type: string
          description: Comma-separated list of material_id values to query on
        - name: _page
          in: query
          type: integer
          description: Page number to request (takes precedent over _limit and _skip).
        - name: _per_page
          in: query
          type: integer
          description: Number of entries to show per page (takes precedent over _limit and _skip). Limited to 1000.
        - name: _skip
          in: query
          type: integer
          description: Number of entries to skip in the search.
        - name: _limit
          in: query
          type: integer
          description: Max number of entries to return in a single query. Limited to 1000.
        - name: _fields
          in: query
          type: string
          description: 'Fields to project from RobocrystallogapherDoc as a list of comma separated strings.                    Fields
            include: `builder_meta` `nsites` `elements` `nelem'
        - name: _all_fields
          in: query
          type: boolean
          description: Include all fields.
    - name: materials-robocrys-text_search
      path: /materials/robocrys/text_search/
      operations:
      - name: searchmaterialsrobocrystextsearchget
        method: GET
        description: Get RobocrystallogapherDoc documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: keywords
          in: query
          type: string
          description: Comma delimited string keywords to search robocrystallographer description text with
          required: true
        - name: _skip
          in: query
          type: integer
          description: Number of entries to skip in the search
        - name: _limit
          in: query
          type: integer
          description: Max number of entries to return in a single query. Limited to 1000 by default
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.MATERIALS_PROJECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: materials-project-materials-robocrystallographer-rest
    port: 8080
    description: REST adapter for Materials Project API — Materials Robocrystallographer. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/materials/robocrys
      name: materials-robocrys
      description: REST surface for materials-robocrys.
      operations:
      - method: GET
        name: searchmaterialsrobocrysget
        description: Get RobocrystallogapherDoc documents
        call: materials-project-materials-robocrystallographer.searchmaterialsrobocrysget
        with:
          material_ids: rest.material_ids
          _page: rest._page
          _per_page: rest._per_page
          _skip: rest._skip
          _limit: rest._limit
          _fields: rest._fields
          _all_fields: rest._all_fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/materials/robocrys/text-search
      name: materials-robocrys-text-search
      description: REST surface for materials-robocrys-text_search.
      operations:
      - method: GET
        name: searchmaterialsrobocrystextsearchget
        description: Get RobocrystallogapherDoc documents
        call: materials-project-materials-robocrystallographer.searchmaterialsrobocrystextsearchget
        with:
          keywords: rest.keywords
          _skip: rest._skip
          _limit: rest._limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: materials-project-materials-robocrystallographer-mcp
    port: 9090
    transport: http
    description: MCP adapter for Materials Project API — Materials Robocrystallographer. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: get-robocrystallogapherdoc-documents
      description: Get RobocrystallogapherDoc documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: materials-project-materials-robocrystallographer.searchmaterialsrobocrysget
      with:
        material_ids: tools.material_ids
        _page: tools._page
        _per_page: tools._per_page
        _skip: tools._skip
        _limit: tools._limit
        _fields: tools._fields
        _all_fields: tools._all_fields
      outputParameters:
      - type: object
        mapping: $.
    - name: get-robocrystallogapherdoc-documents-2
      description: Get RobocrystallogapherDoc documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: materials-project-materials-robocrystallographer.searchmaterialsrobocrystextsearchget
      with:
        keywords: tools.keywords
        _skip: tools._skip
        _limit: tools._limit
      outputParameters:
      - type: object
        mapping: $.
