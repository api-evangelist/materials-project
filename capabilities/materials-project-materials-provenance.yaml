naftiko: 1.0.0-alpha2
info:
  label: Materials Project API — Materials Provenance
  description: 'Materials Project API — Materials Provenance. 1 operations. Lead operation: Get ProvenanceDoc documents. Self-contained
    Naftiko capability covering one Materials Project business surface.'
  tags:
  - Materials Project
  - Materials Provenance
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MATERIALS_PROJECT_API_KEY: MATERIALS_PROJECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: materials-project-materials-provenance
    baseUri: ''
    description: Materials Project API — Materials Provenance business capability. Self-contained, no shared references.
    resources:
    - name: materials-provenance
      path: /materials/provenance/
      operations:
      - name: searchmaterialsprovenanceget
        method: GET
        description: Get ProvenanceDoc documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: material_ids
          in: query
          type: string
          description: Comma-separated list of material_id values to query on
        - name: deprecated
          in: query
          type: string
          description: Whether the material is marked as deprecated
        - name: _page
          in: query
          type: integer
          description: Page number to request (takes precedent over _limit and _skip).
        - name: _per_page
          in: query
          type: integer
          description: Number of entries to show per page (takes precedent over _limit and _skip). Limited to 1000.
        - name: _skip
          in: query
          type: integer
          description: Number of entries to skip in the search.
        - name: _limit
          in: query
          type: integer
          description: Max number of entries to return in a single query. Limited to 1000.
        - name: _fields
          in: query
          type: string
          description: 'Fields to project from ProvenanceDoc as a list of comma separated strings.                    Fields
            include: `builder_meta` `nsites` `elements` `nelements` `co'
        - name: _all_fields
          in: query
          type: boolean
          description: Include all fields.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.MATERIALS_PROJECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: materials-project-materials-provenance-rest
    port: 8080
    description: REST adapter for Materials Project API — Materials Provenance. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/materials/provenance
      name: materials-provenance
      description: REST surface for materials-provenance.
      operations:
      - method: GET
        name: searchmaterialsprovenanceget
        description: Get ProvenanceDoc documents
        call: materials-project-materials-provenance.searchmaterialsprovenanceget
        with:
          material_ids: rest.material_ids
          deprecated: rest.deprecated
          _page: rest._page
          _per_page: rest._per_page
          _skip: rest._skip
          _limit: rest._limit
          _fields: rest._fields
          _all_fields: rest._all_fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: materials-project-materials-provenance-mcp
    port: 9090
    transport: http
    description: MCP adapter for Materials Project API — Materials Provenance. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-provenancedoc-documents
      description: Get ProvenanceDoc documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: materials-project-materials-provenance.searchmaterialsprovenanceget
      with:
        material_ids: tools.material_ids
        deprecated: tools.deprecated
        _page: tools._page
        _per_page: tools._per_page
        _skip: tools._skip
        _limit: tools._limit
        _fields: tools._fields
        _all_fields: tools._all_fields
      outputParameters:
      - type: object
        mapping: $.
