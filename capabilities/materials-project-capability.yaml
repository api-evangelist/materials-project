        - name: volume_max
          in: query
          type: string
          description: Query for maximum value of volume
        - name: volume_min
          in: query
          type: string
          description: Query for minimum value of volume
        - name: density_max
          in: query
          type: string
          description: Query for maximum value of density
        - name: density_min
          in: query
