naftiko: 1.0.0-alpha2
info:
  label: Materials Project API — Materials Elasticity
  description: 'Materials Project API — Materials Elasticity. 1 operations. Lead operation: Get ElasticityDoc documents. Self-contained
    Naftiko capability covering one Materials Project business surface.'
  tags:
  - Materials Project
  - Materials Elasticity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MATERIALS_PROJECT_API_KEY: MATERIALS_PROJECT_API_KEY
capability:
  consumes:
  - type: http
    namespace: materials-project-materials-elasticity
    baseUri: ''
    description: Materials Project API — Materials Elasticity business capability. Self-contained, no shared references.
    resources:
    - name: materials-elasticity
      path: /materials/elasticity/
      operations:
      - name: searchmaterialselasticityget
        method: GET
        description: Get ElasticityDoc documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: material_ids
          in: query
          type: string
          description: Comma-separated list of material_id values to query on
        - name: chemsys
          in: query
          type: string
          description: A comma delimited string list of chemical systems.
        - name: k_voigt_max
          in: query
          type: string
          description: Maximum value for the Voigt average of the bulk modulus in GPa.
        - name: k_voigt_min
          in: query
          type: string
          description: Minimum value for the Voigt average of the bulk modulus in GPa.
        - name: k_reuss_max
          in: query
          type: string
          description: Maximum value for the Reuss average of the bulk modulus in GPa.
        - name: k_reuss_min
          in: query
          type: string
          description: Minimum value for the Reuss average of the bulk modulus in GPa.
        - name: k_vrh_max
          in: query
          type: string
          description: Maximum value for the Voigt-Reuss-Hill average of the bulk modulus in GPa.
        - name: k_vrh_min
          in: query
          type: string
          description: Minimum value for the Voigt-Reuss-Hill average of the bulk modulus in GPa.
        - name: g_voigt_max
          in: query
          type: string
          description: Maximum value for the Voigt average of the shear modulus in GPa.
        - name: g_voigt_min
          in: query
          type: string
          description: Minimum value for the Voigt average of the shear modulus in GPa.
        - name: g_reuss_max
          in: query
          type: string
          description: Maximum value for the Reuss average of the shear modulus in GPa.
        - name: g_reuss_min
          in: query
          type: string
          description: Minimum value for the Reuss average of the shear modulus in GPa.
        - name: g_vrh_max
          in: query
          type: string
          description: Maximum value for the Voigt-Reuss-Hill average of the shear modulus in GPa.
        - name: g_vrh_min
          in: query
          type: string
          description: Minimum value for the Voigt-Reuss-Hill average of the shear modulus in GPa.
        - name: elastic_anisotropy_max
          in: query
          type: string
          description: Maximum value for the elastic anisotropy.
        - name: elastic_anisotropy_min
          in: query
          type: string
          description: Maximum value for the elastic anisotropy.
        - name: poisson_max
          in: query
          type: string
          description: Maximum value for Poisson's ratio.
        - name: poisson_min
          in: query
          type: string
          description: Minimum value for Poisson's ratio.
        - name: _page
          in: query
          type: integer
          description: Page number to request (takes precedent over _limit and _skip).
        - name: _per_page
          in: query
          type: integer
          description: Number of entries to show per page (takes precedent over _limit and _skip). Limited to 1000.
        - name: _skip
          in: query
          type: integer
          description: Number of entries to skip in the search.
        - name: _limit
          in: query
          type: integer
          description: Max number of entries to return in a single query. Limited to 1000.
        - name: _fields
          in: query
          type: string
          description: 'Fields to project from ElasticityDoc as a list of comma separated strings.                    Fields
            include: `builder_meta` `nsites` `elements` `nelements` `co'
        - name: _all_fields
          in: query
          type: boolean
          description: Include all fields.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.MATERIALS_PROJECT_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: materials-project-materials-elasticity-rest
    port: 8080
    description: REST adapter for Materials Project API — Materials Elasticity. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/materials/elasticity
      name: materials-elasticity
      description: REST surface for materials-elasticity.
      operations:
      - method: GET
        name: searchmaterialselasticityget
        description: Get ElasticityDoc documents
        call: materials-project-materials-elasticity.searchmaterialselasticityget
        with:
          material_ids: rest.material_ids
          chemsys: rest.chemsys
          k_voigt_max: rest.k_voigt_max
          k_voigt_min: rest.k_voigt_min
          k_reuss_max: rest.k_reuss_max
          k_reuss_min: rest.k_reuss_min
          k_vrh_max: rest.k_vrh_max
          k_vrh_min: rest.k_vrh_min
          g_voigt_max: rest.g_voigt_max
          g_voigt_min: rest.g_voigt_min
          g_reuss_max: rest.g_reuss_max
          g_reuss_min: rest.g_reuss_min
          g_vrh_max: rest.g_vrh_max
          g_vrh_min: rest.g_vrh_min
          elastic_anisotropy_max: rest.elastic_anisotropy_max
          elastic_anisotropy_min: rest.elastic_anisotropy_min
          poisson_max: rest.poisson_max
          poisson_min: rest.poisson_min
          _page: rest._page
          _per_page: rest._per_page
          _skip: rest._skip
          _limit: rest._limit
          _fields: rest._fields
          _all_fields: rest._all_fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: materials-project-materials-elasticity-mcp
    port: 9090
    transport: http
    description: MCP adapter for Materials Project API — Materials Elasticity. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-elasticitydoc-documents
      description: Get ElasticityDoc documents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: materials-project-materials-elasticity.searchmaterialselasticityget
      with:
        material_ids: tools.material_ids
        chemsys: tools.chemsys
        k_voigt_max: tools.k_voigt_max
        k_voigt_min: tools.k_voigt_min
        k_reuss_max: tools.k_reuss_max
        k_reuss_min: tools.k_reuss_min
        k_vrh_max: tools.k_vrh_max
        k_vrh_min: tools.k_vrh_min
        g_voigt_max: tools.g_voigt_max
        g_voigt_min: tools.g_voigt_min
        g_reuss_max: tools.g_reuss_max
        g_reuss_min: tools.g_reuss_min
        g_vrh_max: tools.g_vrh_max
        g_vrh_min: tools.g_vrh_min
        elastic_anisotropy_max: tools.elastic_anisotropy_max
        elastic_anisotropy_min: tools.elastic_anisotropy_min
        poisson_max: tools.poisson_max
        poisson_min: tools.poisson_min
        _page: tools._page
        _per_page: tools._per_page
        _skip: tools._skip
        _limit: tools._limit
        _fields: tools._fields
        _all_fields: tools._all_fields
      outputParameters:
      - type: object
        mapping: $.
