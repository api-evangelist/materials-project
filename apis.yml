aid: materials-project
name: Materials Project
description: >-
  The Materials Project API provides direct access to the Materials Project
  database, a large-scale computational materials science database with data on
  tens of thousands of materials. The API is offered free of charge and supports
  machine learning, automated analysis, and bulk data downloads.
