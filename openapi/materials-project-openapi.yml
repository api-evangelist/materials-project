tags:
- name: Materials Summary
  description: Route providing a large amount of amalgamated data for a material.
    This is constructed by             combining subsets of data from many of the
    other API endpoints. The summary endpoint is very useful for             performing
    queries for materials over a large property space. Note that every unique material
    within             the Materials Project should have a set of summary data. See
    the `SummaryDoc` schema for a full list of             fields returned by this
    route.
- name: Materials
  description: Route for "core" information associated with a given material in the
    Materials Project             database. The unique identifier for a material is
    its `material_id` (e.g. `mp-149`). Core data in             this context refers
    to the crystal structure, information associated with it such as the density             and
    chemical formula, and the associated calculations which are identified with unique
    `task_id`             values. It does not contain any materials properties such
    as the formation energy or band gap, please             consult other property-specific
    endpoints for this information. See the `MaterialsDoc` schema for             a
    full list of fields returned by this route.
- name: Materials Tasks
  description: Route for "core" information associated with a given calculation in
    the Materials Project             database. Multiple calculations can ultimately
    be associated with a unique material, and are the source             of its reported
    properties. The unique identifier for a calculation is its `task_id`. Note             that
    the `material_id` chosen for a given material is sourced from one of the `task_id`
    values             associated with it. Core data in this context refers to calculation
    quantities such as parsed input             and output data (e.g. VASP input flags,
    atomic forces, structures) and runtime statistics. See the             `TaskDoc`
    schema for a full list of fields returned by this route.
- name: Materials Thermo
  description: Route providing computed thermodynamic data for a material such as             formation
    energy and energy above hull. Corrected energy values are also available that
    employ             the schemes discussed by             [Jain *et al.*](https://journals.aps.org/prb/abstract/10.1103/PhysRevB.84.045115)             and
    [Wang *et al.*](https://chemrxiv.org/engage/chemrxiv/article-details/60c758d9469df42a4ef45757)            See
    the `ThermoDoc` schema for a full list of fields returned by this route.
  externalDocs:
    description: For a more detailed description
    url: https://docs.materialsproject.org/methodology/total-energies
- name: Materials Dielectric
  description: Route providing computed dielectric data for a material following the             methodology
    discussed by [Petousis *et al.*](https://doi.org/10.1038/sdata.2016.134)             Note
    that dielectric data has not been calculated for all materials in the Materials             Project
    database. See the `DielectricDoc` schema for a full list of fields returned by
    this route.
  externalDocs:
    description: For a more detailed description
    url: https://docs.materialsproject.org/methodology/dielectricity
- name: Materials Magnetism
  description: Route providing computed magnetic ordering related data for a material
    following the             methodology discussed by [Horton *et al.*](https://doi.org/10.1038/s41524-019-0199-7)             Note
    that magnetic data has not been calculated for all materials in the Materials             Project
    database. See the `MagnetismDoc` schema for a full list of fields returned by
    this route.
- name: Materials Piezoelectric
  description: Route providing computed piezoelectric data for a material following
    the             methodology discussed by [de Jong *et al.*](https://doi.org/10.1038/sdata.2015.53)             Note
    that piezoelectric data has not been calculated for all materials in the Materials             Project
    database. See the `PiezoDoc` schema for a full list of fields returned by this
    route.
  externalDocs:
    description: For a more detailed description
    url: https://docs.materialsproject.org/methodology/piezoelectricity
- name: Materials Phonon
  description: '**Under construction** Route providing computed phonon data for a
    material following the             methodology discussed by [Petretto *et al.*](https://doi.org/10.1038/sdata.2018.65)             Note
    that phonon data has not been calculated for all materials in the Materials             Project
    database. See the `PhononBSDOSDoc` schema for a full list of fields returned by
    this route.'
  externalDocs:
    description: For a more detailed description
    url: https://docs.materialsproject.org/methodology/phonons
- name: Materials EOS
  description: Route providing computed equations of state data for a material following
    the             methodology discussed by [Latimer *et al.*](https://doi.org/10.1038/s41524-018-0091-x)             Note
    that equations of state data has not been calculated for all materials in the
    Materials             Project database. See the `EOSDoc` schema for a full list
    of fields returned by this route.
  externalDocs:
    description: For a more detailed description
    url: https://docs.materialsproject.org/methodology/equations-of-state
- name: Materials Similarity
  description: Route providing a computed similarity metric between materials following
    the             methodology discussed by Zimmerman *et al.* in [10.3389/fmats.2017.00034](https://doi.org/10.3389/fmats.2017.00034)             and
    [10.1039/C9RA07755C](https://doi.org/10.1039/C9RA07755C).             Note that
    similarity data has not been calculated for all materials in the Materials             Project
    database. See the `SimilarityDoc` schema for a full list of fields returned by
    this route.
- name: Materials XAS
  description: Route providing computed x-ray absorption spectroscopy data for a material
    following the             methodology discussed by [Mathew *et al.*](https://doi.org/10.1038/sdata.2018.151)             and
    [Chen *et al.*](https://doi.org/10.1038/s41597-021-00936-5)             Note that
    x-ray absorption spectroscopy data has not been calculated for all materials in
    the Materials             Project database. See the `XASDoc` schema for a full
    list of fields returned by this route.
- name: Materials Grain Boundaries
  description: Route providing computed grain boundary data for a material following
    the             methodology discussed by [Hui *et al.*](https://doi.org/10.1016/j.actamat.2019.12.030)             Note
    that grain boundary data has not been calculated for all materials in the Materials             Project
    database. See the `GrainBoundaryDoc` schema for a full list of fields returned
    by this route.
- name: Materials Electronic Structure
  description: Routes providing computed electronic structure related data for a material
    such as             band gap and fermi level. Python objects for line-mode band
    structures, density of states, and             fermi surfaces are also available.
    This data was obtained following the methodology discussed by             [Munro
    *et al.*](https://doi.org/10.1038/s41524-020-00383-7) and [Ganose *et al.*](https://doi.org/10.21105/joss.03089)             Note
    that full band structure, density of states, and fermi surface data has not been
    calculated for             all materials in the Materials Project database. See
    the `ElectronicStructureDoc` and `FermiDoc` schema             for a full list
    of fields returned by the associated routes.
  externalDocs:
    description: For a more detailed description
    url: https://docs.materialsproject.org/methodology/electronic-structure
- name: Materials Elasticity
  description: Route providing computed elasticity data for a material following the             methodology
    discussed by [de Jong *et al.*](https://doi.org/10.1038/sdata.2015.9)             Note
    that elasticity data has not been calculated for all materials in the Materials             Project
    database. See the `ElasticityDoc` schema for a full list of fields returned by
    this route.
  externalDocs:
    description: For a more detailed description
    url: https://docs.materialsproject.org/methodology/elasticity
- name: Materials Substrates
  description: Route providing computed suggested substrate data for a material following
    the             methodology discussed by [Ding *et al.*](https://doi.org/10.1021/acsami.6b01630)             Note
    that substrate data has not been calculated for all materials in the Materials             Project
    database. See the `SubstratesDoc` schema for a full list of fields returned by
    this route.
- name: Materials Surface Properties
  description: Route providing computed surface property data for a material following
    the             methodology discussed by [Tran *et al.*](https://doi.org/10.1038/sdata.2016.80)             Note
    that surface data has not been calculated for all materials in the Materials             Project
    database. See the `SurfacePropDoc` schema for a full list of fields returned by
    this route.
- name: Materials Robocrystallographer
  description: Route providing a computed text description for a material following
    the             methodology discussed by [Ganose *et al.*](https://doi.org/10.1557/mrc.2019.94)             Note
    that descriptions may not been calculated for all materials in the Materials             Project
    database. See the `RobocrysDoc` schema for a full list of fields returned by this
    route.
- name: Materials Synthesis
  description: Route providing a synthesis recipes for materials extracted from literature             following
    the methodology discussed by [Kononova *et al.*](https://doi.org/10.1038/s41597-019-0224-1)             Note
    that synthesis recipes may not be available for all materials in the Materials             Project
    database. See the `SynthesisSearchResultModel` schema for a full list of fields
    returned by this route.
- name: Materials Electrodes
  description: Route providing computed electrode data for a material following the             methodology
    discussed by [Shen *et al.*](https://doi.org/10.1038/s41524-020-00422-3)             Note
    that electrode data has not been calculated for all materials in the Materials             Project
    database. See the `InsertionElectrodeDoc` and `ConversionElectrodeDoc` schema             for
    a full list of fields returned by this route.
- name: Materials Oxidation States
  description: Route providing computed oxidation state data for a material following
    the             methodology employed by the [BVAnalyzer](https://pymatgen.org/pymatgen.analysis.bond_valence.html)             in
    Pymatgen. Note that oxidation state data has not been calculated for all materials
    in the Materials             Project database. See the `OxidationStateDoc` schema
    for a full list of fields returned by this route.
- name: Materials Provenance
  description: Route providing provenance data for a material such as whether it is
    theoretical,             its associated ICSD entries, and relevant references
    in literature. Note that provenance data             may not be available for
    all materials in the Materials Project database. See the `ProvenanceDoc`             schema
    for a full list of fields returned by this route.
- name: Materials Charge Density
  description: Route providing computed charge density data for a material following
    the             methodology discussed by [Shen *et al.*](https://arxiv.org/abs/2107.03540).
    Please email             <heavy.api.use@materialsproject.org> if you would like
    to retrieve a large amount of this data.             Note that charge densities
    may not be calculated for all materials in the Materials             Project database.
    See the `VolumetricDataDoc` schema for a full list of fields returned by this
    route.
- name: Materials Alloys
  description: Route for retrevial of information about which hypothetical alloy(s)
    a given material might belong to, following the methodolgy discussed by [Woods-Robinson,
    Horton and Persson](https://arxiv.org/pdf/2206.10715).
- name: Materials Bonds
  description: Route for retrevial of bonding information for a given material.
- name: MPComplete
  description: Route for submitting structures to the Materials Project. If calculations
    are run with the             submitted structure, the submitter will be credited
    with the submitted public name and email.
- name: DOIs
  description: Route providing DOI and bibtex reference information for a material.             Note
    that this data may not be available for all materials in the Materials             Project
    database. See the `DOIDoc` schema for a full list of fields returned by this route.
- name: Molecules Tasks
  description: Route for basic task information for DFT calculations in the Materials
    Project             molecules database. Multiple calculations can ultimately be
    associated with a unique molecule,             and are the source of its reported
    properties. The unique identifier for a calculation is its             `task_id`.
    See the `TaskDocument` schema for a full list of fields returned by this route.
- name: Associated Molecules
  description: Route for 'associated' molecule data. Construction of the Materials
    Project molecules             database occurs in two stages. In the first stage,
    calculations using the exact same formula, charge,             spin multiplicity,
    and molecular geometry (defined by bond lengths, angles, etc.) are associated.             In
    the second stage, multiple 'associated molecules' with the same basic properties
    (formula, charge, spin)             and connectivity (based on molecular graph
    isomorphism) are collected, forming the 'core' molecules             collection.
    This route provides access to data for individual 'associated molecules'. The
    'Core Molecules'             route (/molecules/molecules/) contains data for core
    molecules. See the `MoleculeDoc` schema for a full list             of fields
    returned by this route.
- name: Core Molecules
  description: Route for 'core' molecule data. Construction of the Materials Project
    molecules             database occurs in two stages. In the first stage, calculations
    using the exact same formula, charge,             spin multiplicity, and molecular
    geometry (defined by bond lengths, angles, etc.) are associated.             In
    the second stage, multiple 'associated molecules' with the same basic properties
    (formula, charge, spin)             and connectivity (based on molecular graph
    isomorphism) are collected, forming the 'core' molecules             collection.
    This route provides access to data for individual 'associated molecules'. The
    'Associated Molecules'             route (/molecules/assoc/) contains data for
    'associated' molecules. See the `MoleculeDoc` schema for a full list             of
    fields returned by this route.
- name: Molecules Partial Charges
  description: Route for molecular partial charge data. See the `PartialChargesDoc`
    schema for a full list             of fields returned by this route.
- name: Molecules Partial Spins
  description: Route for molecular partial spin data. See the `PartialSpinsDoc` schema
    for a full list             of fields returned by this route.
- name: Molecules Bonds
  description: Route for molecular bonding data. See the `MoleculeBondingDoc` schema
    for a full list             of fields returned by this route.
- name: Molecules Metal Binding
  description: Route for data regarding metal binding to molecules. See the `MetalBindingDoc`
    schema             for a full list of fields returned by this route.
- name: Molecules Orbitals
  description: Route for molecular orbital information obtained via Natural Bonding
    Orbital analysis.             See the `OrbitalDoc` schema for a full list of fields
    returned by this route.
- name: Molecules Redox
  description: Route for molecular redox information (e.g. ionization energy, reduction
    free energy,             redox potentials). See the `RedoxDoc` schema for a full
    list of fields returned by this route.
- name: Molecules Thermo
  description: Route for molecular thermochemistry information. See the `MoleculeThermoDoc`
    schema for             a full list of fields returned by this route.
- name: Molecules Vibrations
  description: Route for molecular normal mode and IR spectroscopy data. See the `VibrationDoc`
    schema for             a full list of fields returned by this route.
- name: Molecules Summary
  description: Route for a summary of all data calculated on 'core' molecules in the
    Materials Project             molecules database. See the `MoleculeSummaryDoc`
    schema for a full list of fields returned by this route.
- name: JCESR Electrolyte Genome
  description: Route providing computed data for a legacy molecule such as charge,             electron
    affinity, and ionization energy. The unique identifier for a molecule             is
    its `task_id` (e.g. `mol-45807`). See the `MoleculesDoc` schema for a full list
    of             fields returned by this route.
security:
- ApiKeyAuth: []
