        formula_pretty:
          anyOf:
          - type: string
          - type: 'null'
          title: Pretty Formula
          description: Cleaned representation of the formula.
        formula_anonymous:
          anyOf:
          - type: string
          - type: 'null'
          title: Anonymous Formula
          description: Anonymized representation of the formula.
        chemsys:
          anyOf:
          - type: string
          - type: 'null'
          title: Chemical System
          description: Dash-separated string of elements in the material.
        volume:
          anyOf:
          - type: number
          - type: 'null'
          title: Volume
          description: "Total volume for this structure in \xC5\xB3."
        density:
          anyOf:
          - type: number
          - type: 'null'
          title: Density
          description: "Density in g/cm\xB3."
        density_atomic:
          anyOf:
          - type: number
          - type: 'null'
          title: Packing Density
          description: "The atomic packing density in \xC5\xB3/atom."
        symmetry:
          anyOf:
