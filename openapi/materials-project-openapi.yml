    url: https://raw.githubusercontent.com/materialsproject/emmet/master/emmet-api/emmet/api/core/assets/mp_logo_small.png
paths:
  /doi/:
    get:
      tags:
      - DOIs
      summary: Get DOIDoc documents
      operationId: search_doi__get
      parameters:
      - name: material_ids
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated list of material_id values to query on
          title: Material Ids
        description: Comma-separated list of material_id values to query on
      - name: _page
        in: query
        required: false
        schema:
          type: integer
          description: Page number to request (takes precedent over _limit and _skip).
          title: ' Page'
        description: Page number to request (takes precedent over _limit and _skip).
      - name: _per_page
        in: query
        required: false
        schema:
          type: integer
          description: Number of entries to show per page (takes precedent over _limit
            and _skip). Limited to 1000.
          default: 100
          title: ' Per Page'
        description: Number of entries to show per page (takes precedent over _limit
          and _skip). Limited to 1000.
      - name: _skip
        in: query
        required: false
        schema:
          type: integer
          description: Number of entries to skip in the search.
          default: 0
          title: ' Skip'
        description: Number of entries to skip in the search.
      - name: _limit
        in: query
        required: false
        schema:
          type: integer
          description: Max number of entries to return in a single query. Limited
            to 1000.
          default: 100
          title: ' Limit'
        description: Max number of entries to return in a single query. Limited to
          1000.
      - name: _fields
        in: query
        required: false
        schema:
          type: string
          description: 'Fields to project from DOIDoc as a list of comma separated
            strings.                    Fields include: `doi` `bibtex` `material_id`'
          title: ' Fields'
        description: 'Fields to project from DOIDoc as a list of comma separated strings.                    Fields
          include: `doi` `bibtex` `material_id`'
      - name: _all_fields
        in: query
        required: false
        schema:
          type: boolean
          description: Include all fields.
          default: false
          title: ' All Fields'
        description: Include all fields.
      responses:
        '200':
          description: Search for a DOIDoc
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_DOIDoc_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
