          type: array
          title: Authors
          description: list of authors for this material
        remarks:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Remarks
          description: list of remarks for the provenance of this material
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
        theoretical:
