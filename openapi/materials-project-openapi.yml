components:
  schemas:
    AbsorptionDoc:
      properties:
        builder_meta:
          anyOf:
          - $ref: '#/components/schemas/EmmetMeta'
          - type: 'null'
          description: Builder metadata.
        nsites:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nsites
          description: Total number of sites in the structure.
        elements:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Elements
          description: List of elements in the material.
        nelements:
          anyOf:
          - type: integer
          - type: 'null'
          title: Nelements
          description: Number of elements.
        composition:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          title: Composition
          description: Full composition for the material.
        composition_reduced:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          title: Reduced Composition
          description: Simplified representation of the composition.
        formula_pretty:
          anyOf:
          - type: string
          - type: 'null'
          title: Pretty Formula
          description: Cleaned representation of the formula.
        formula_anonymous:
          anyOf:
          - type: string
          - type: 'null'
          title: Anonymous Formula
          description: Anonymized representation of the formula.
        chemsys:
          anyOf:
          - type: string
          - type: 'null'
          title: Chemical System
          description: Dash-separated string of elements in the material.
        volume:
          anyOf:
          - type: number
          - type: 'null'
          title: Volume
          description: "Total volume for this structure in \xC5\xB3."
        density:
          anyOf:
          - type: number
          - type: 'null'
          title: Density
          description: "Density in g/cm\xB3."
        density_atomic:
          anyOf:
          - type: number
          - type: 'null'
          title: Packing Density
          description: "The atomic packing density in \xC5\xB3/atom."
        symmetry:
          anyOf:
          - $ref: '#/components/schemas/SymmetryData'
          - type: 'null'
          description: Symmetry data for this material.
        material_id:
          anyOf:
          - type: string
            pattern: ^([A-Za-z]+-)?(\d+)(-[A-Za-z0-9]+)*$
            examples:
            - mp-3534
            - '3453'
            - mp-834-Ag
          - type: string
            examples:
            - mp-ft
            - task:pqrs
          - type: 'null'
          title: Material Id
          description: 'The Materials Project ID of the material, used as a universal
            reference across property documents.This comes in the form: mp-******.'
        deprecated:
          type: boolean
          title: Deprecated
          description: Whether this property document is deprecated.
          default: true
        deprecation_reasons:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Deprecation Reasons
          description: List of deprecation tags detailing why this document isn't
            valid.
        last_updated:
          type: string
          format: date-time
          title: Last Updated
          description: Timestamp for the most recent calculation update for this property.
        origins:
          anyOf:
          - items:
              $ref: '#/components/schemas/PropertyOrigin'
            type: array
          - type: 'null'
          title: Origins
          description: Dictionary for tracking the provenance of properties.
        warnings:
          items:
            type: string
          type: array
          title: Warnings
          description: Any warnings related to this property.
          default: []
        property_name:
          type: string
          title: Property Name
          default: Optical absorption spectrum
        task_id:
          type: string
          title: Task Id
          description: Calculation id
        energies:
          items:
            type: number
          type: array
          title: Energies
          description: Absorption energy in eV starting from 0
        energy_max:
          type: number
          title: Energy Max
          description: Maximum energy
        absorption_coefficient:
          items:
            type: number
          type: array
          title: Absorption Coefficient
          description: Absorption coefficient in cm^-1
        average_imaginary_dielectric:
          items:
            type: number
          type: array
          title: Average Imaginary Dielectric
          description: Imaginary part of the dielectric function corresponding to
            the energies
        average_real_dielectric:
          items:
            type: number
          type: array
          title: Average Real Dielectric
          description: Real part of the dielectric function corresponding to the energies
        bandgap:
          anyOf:
          - type: number
          - type: 'null'
          title: Bandgap
          description: The electronic band gap
        nkpoints:
          anyOf:
          - type: number
          - type: 'null'
          title: Nkpoints
          description: The number of kpoints used in the calculation
      type: object
      required:
      - task_id
      - energies
      - energy_max
      - absorption_coefficient
      - average_imaginary_dielectric
      - average_real_dielectric
      title: AbsorptionDoc
      description: Absorption spectrum based on frequency dependent dielectric function
        calculations.
    AlloyPairDoc:
      properties:
        builder_meta:
          anyOf:
          - $ref: '#/components/schemas/EmmetMeta'
          - type: 'null'
          description: Builder metadata.
        alloy_pair:
          $ref: '#/components/schemas/TypedAlloyPairDict'
          title: Alloy Pair
        pair_id:
          type: string
          title: Pair Id
      type: object
      required:
      - alloy_pair
      - pair_id
      title: AlloyPairDoc
    AnalysisDoc:
      properties:
        delta_volume:
          anyOf:
          - type: number
          - type: 'null'
          title: Volume Change
          description: Volume change for the calculation.
        delta_volume_percent:
          anyOf:
          - type: number
          - type: 'null'
          title: Volume Change Percent
          description: Percent volume change for the calculation.
        max_force:
          anyOf:
          - type: number
          - type: 'null'
          title: Max Force
          description: Maximum force on any atom at the end of the calculation.
        warnings:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Calculation Warnings
          description: Warnings issued after analysis.
        errors:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Calculation Errors
          description: Errors issued after analysis.
      type: object
      title: AnalysisDoc
    AtlasSearchHighlight:
      properties:
        score:
          anyOf:
          - type: number
          - type: 'null'
          title: Score
        path:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
        texts:
          anyOf:
          - items:
              $ref: '#/components/schemas/AtlasSearchText'
            type: array
          - type: 'null'
          title: Texts
      type: object
      title: AtlasSearchHighlight
      description: Schematize MongoDB Atlas search highlight match.
    AtlasSearchText:
      properties:
        value:
          anyOf:
          - type: string
          - type: 'null'
          title: Value
        type:
          anyOf:
          - type: string
          - type: 'null'
          title: Type
      type: object
      title: AtlasSearchText
      description: Schematize MongoDB Atlas search text match.
    Author:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
      type: object
      title: Author
      description: Author information
    BaderAnalysis:
      properties:
        min_dist:
          items:
            type: number
          type: array
          title: Min Dist
        charge:
          items:
            type: number
          type: array
          title: Charge
        atomic_volume:
          items:
            type: number
          type: array
          title: Atomic Volume
        vacuum_charge:
          type: number
          title: Vacuum Charge
        vacuum_volume:
          type: number
          title: Vacuum Volume
        reference_used:
          type: boolean
          title: Reference Used
        bader_version:
          type: number
          title: Bader Version
        charge_transfer:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Charge Transfer
        magmom:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Magmom
      type: object
      required:
      - min_dist
      - charge
      - atomic_volume
      - vacuum_charge
      - vacuum_volume
      - reference_used
      - bader_version
      title: BaderAnalysis
      description: 'Output of pymatgen.command_line.bader_caller.bader_analysis_from_objects


        We omit the `charge_densities` field, since these are too large

        to justify storing in the document model.


        Charge densities can already be stored in TaskDoc.vasp_objects'
    BandStructureSummaryData:
      properties:
        task_id:
          anyOf:
          - type: string
            pattern: ^([A-Za-z]+-)?(\d+)(-[A-Za-z0-9]+)*$
            examples:
            - mp-3534
            - '3453'
            - mp-834-Ag
          - type: string
            examples:
            - mp-ft
            - task:pqrs
          title: Task Id
          description: The source calculation (task) ID for the electronic structure
            data. This has the same form as a Materials Project ID.
        band_gap:
          type: number
          title: Band Gap
          description: Band gap energy in eV.
        cbm:
          anyOf:
          - $ref: '#/components/schemas/TypedBandDict'
          - type: 'null'
          description: Conduction band minimum data.
        vbm:
          anyOf:
          - $ref: '#/components/schemas/TypedBandDict'
          - type: 'null'
          description: Valence band maximum data.
        efermi:
          anyOf:
          - type: number
          - type: 'null'
          title: Efermi
          description: Fermi energy in eV.
        is_gap_direct:
          type: boolean
          title: Is Gap Direct
          description: Whether the band gap is direct.
        is_metal:
          type: boolean
          title: Is Metal
          description: Whether the material is a metal.
        magnetic_ordering:
          type: string
          description: Magnetic ordering of the calculation.
        equivalent_labels:
          additionalProperties:
            additionalProperties:
              additionalProperties:
                type: string
              type: object
            type: object
          type: object
          title: Equivalent Labels
          description: Equivalent k-point labels in other k-path conventions.
        nbands:
          type: number
          title: Nbands
          description: Number of bands.
        direct_gap:
          type: number
          title: Direct Gap
          description: Direct gap energy in eV.
      type: object
      required:
      - task_id
      - band_gap
      - is_gap_direct
      - is_metal
      - magnetic_ordering
      - equivalent_labels
      - nbands
