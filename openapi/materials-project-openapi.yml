openapi: 3.1.0
info:
  title: Materials Project API
  description: "\nThe Materials Project API allows anyone to have direct access to\
    \ current, up-to-date information from the Materials Project database in a structured\
    \ way.\n\nThis allows for analysis, development of automated tools, machine learning,\
    \ downloading personal copies of the Materials Project database and more on a\
    \ large scale.\n\nThe API is offered with the hopes of making Materials Project\
    \ data more useful to you. We want you to use our data! As such, the API is offered\
    \ free-of-charge and we support several tools to help you get started.\n\n## API\
    \ Key\nTo make any request to the Materials Project API, you must use an API key.\
    \ Your API key is generated for you automatically upon registering with the Materials\
    \ Project website and is synced with the email you used to register.\n\nRemember\
    \ to keep your API key safe and to not share it with anyone you do not trust.\n\
    \nIf you are logged in, you can always access your API key from this page or from\
    \ your [dashboard](https://next-gen.materialsproject.org/dashboard).\n\nIf you\
    \ intend heavy API usage, you can give us a heads up by sending a message to <heavy.api.use@materialsproject.org>.\
    \ With the exception of retrieving charge densities, this is not required, but\
    \ may help us if we see unusual load on our servers.\n\n## Accessing Data\nTo\
    \ use the API, you have three options:\n\n1. You can use our first-party supported\
    \ Python client. This is the recommend route. The `mp-api` package containing\
    \ the client is pip installable.\n\n    ```\n    pip install mp-api\n    ```\n\
    \n    The `MPRester` client can be accessed by importing from it. This will ultimately\
    \ replace the legacy `MPRester` available in pymatgen.\n\n    For more details\
    \ on how to use this, including code examples, please see <https://next-gen.materialsproject.org/api>.\n\
    \n2. You can demo the API interactively on this documentation page. Click the\
    \ \"Authorize\" button, paste in your API key, and then click the appropriate\
    \ section to try out a query.\n\n3. Since this is a REST API, and offers a fully-compliant\
    \ OpenAPI specification, it's possible to use the API with many libraries in many\
    \ languages and environments, including JavaScript, MATLAB, Mathematica, etc.\
    \ However, we do not offer first-party support for explaining how to do this,\
    \ and you will have to follow the specification yourself.\n\n"
  version: 0.86.4rc5.dev1+g77c2c1315
