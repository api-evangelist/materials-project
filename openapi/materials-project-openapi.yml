    RedoxComposite:
      properties:
        property_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Property Id
          description: Property ID for this RedoxDoc.
        level_of_theory:
          anyOf:
          - type: string
          - type: 'null'
          title: Level Of Theory
          description: Level of theory for this RedoxDoc.
        electron_affinity:
          anyOf:
          - type: number
          - type: 'null'
          title: Electron Affinity
          description: Vertical electron affinity in eV
        ea_task_id:
          anyOf:
          - type: string
            pattern: ^([A-Za-z]+-)?(\d+)(-[A-Za-z0-9]+)*$
            examples:
            - mp-3534
            - '3453'
            - mp-834-Ag
          - type: 'null'
          title: Ea Task Id
          description: Molecule ID for electron affinity
        ionization_energy:
          anyOf:
          - type: number
          - type: 'null'
          title: Ionization Energy
          description: Vertical ionization energy in eV
        ie_task_id:
          anyOf:
          - type: string
            pattern: ^([A-Za-z]+-)?(\d+)(-[A-Za-z0-9]+)*$
            examples:
            - mp-3534
            - '3453'
            - mp-834-Ag
          - type: 'null'
          title: Ie Task Id
          description: Molecule ID for ionization energy
        reduction_free_energy:
          anyOf:
          - type: number
          - type: 'null'
          title: Reduction Free Energy
          description: Adiabatic free energy of reduction
        red_molecule_id:
          anyOf:
          - type: string
            pattern: ^^([A-Za-z]+-)?([A-Fa-f0-9]+)-([A-Za-z0-9]+)-(m?[0-9]+)-([0-9]+)$
            examples:
            - 1a525231bdac3f13e2fac0962fe8d053-Mg1-0-1
            - 22b40b99719ac570fc7e6225e855ec6e-F5Li1P1-m1-2
            - mpcule-b9ba54febc77d2a9177accf4605767db-C1H41-2
          - type: 'null'
          title: Red Molecule Id
          description: Molecule ID for adiabatic reduction
        oxidation_free_energy:
          anyOf:
          - type: number
          - type: 'null'
          title: Oxidation Free Energy
          description: Adiabatic free energy of oxidation
        ox_molecule_id:
          anyOf:
          - type: string
            pattern: ^^([A-Za-z]+-)?([A-Fa-f0-9]+)-([A-Za-z0-9]+)-(m?[0-9]+)-([0-9]+)$
            examples:
            - 1a525231bdac3f13e2fac0962fe8d053-Mg1-0-1
            - 22b40b99719ac570fc7e6225e855ec6e-F5Li1P1-m1-2
            - mpcule-b9ba54febc77d2a9177accf4605767db-C1H41-2
          - type: 'null'
          title: Ox Molecule Id
          description: Molecule ID for adiabatic oxidation
        reduction_potential:
          anyOf:
          - type: number
          - type: 'null'
          title: Reduction Potential
          description: 'Reduction potential referenced to the standard hydrogen electrode
            (SHE) (units: V)'
        oxidation_potential:
          anyOf:
          - type: number
          - type: 'null'
          title: Oxidation Potential
          description: 'Oxidation potential referenced to the standard hydrogen electrode
            (SHE) (units: V)'
      type: object
      title: RedoxComposite
      description: Summary information obtained from RedoxDocs
    RelaxTrajectory:
      properties:
        elements:
          items:
            type: integer
          type: array
          title: Elements
          description: The proton number Z of the elements in the sites
        cart_coords:
          items:
            anyOf:
            - items:
                prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              type: array
            - type: 'null'
          type: array
          title: Cart Coords
          description: "The Cartesian coordinates (\xC5) of the sites at each ionic\
            \ step"
        num_ionic_steps:
          type: integer
          title: Num Ionic Steps
          description: The number of ionic steps.
        lattice:
          anyOf:
          - items:
              prefixItems:
              - prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              - prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              - prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              type: array
              maxItems: 3
              minItems: 3
            type: array
          - type: 'null'
          title: Lattice
          description: If a list containing only one 3x3 matrix, it is assumed that
            the lattice was held constant through the simulation. If a list of (multiple)
            3x3 matrices, this should be the lattice at each ionic step in the calculation.
            If None, a non-periodic system is assumed.
        energy:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Energy
          description: The total energy at each ionic step.
        forces:
          anyOf:
          - items:
              items:
                prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              type: array
            type: array
          - type: 'null'
          title: Forces
          description: The interatomic forces.
        stress:
          anyOf:
          - items:
              prefixItems:
              - prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              - prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              - prefixItems:
                - type: number
                - type: number
                - type: number
                type: array
                maxItems: 3
                minItems: 3
              type: array
              maxItems: 3
              minItems: 3
            type: array
          - type: 'null'
          title: Stress
          description: The 3x3 stress tensor.
        electronic_steps:
          anyOf:
          - items:
              items:
                $ref: '#/components/schemas/ElectronicStep'
              type: array
            type: array
          - type: 'null'
          title: Electronic Steps
          description: The electronic steps within a given ionic step.
        num_electronic_steps:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Num Electronic Steps
          description: The number of electronic steps within each ionic step.
        e_wo_entrp:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: E Wo Entrp
          description: The total energy in eV without electronic pseudoentropy from
            smearing of the Fermi surface.
        e_fr_energy:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: E Fr Energy
          description: The total electronic free energy in eV.
        identifier:
          anyOf:
          - type: string
          - type: 'null'
          title: Identifier
          description: Identifier of this trajectory, e.g., task ID.
        task_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Task Type
          description: The TaskType of the calculation used to generate this trajectory.
        run_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Run Type
          description: The RunType of the calculation used to generate this trajectory.
      type: object
      required:
      - elements
      - cart_coords
      - num_ionic_steps
      title: RelaxTrajectory
      description: "Low memory schema for relaxation trajectories that can interface\
        \ with parquet, pymatgen, and ASE.\n\nThis schema is intended primarily for\
        \ VASP relaxation trajectories, but could be adapted to\ngeneric electronic\
        \ structure trajectories.\n\nNote that for VASP calculations, energies are\
        \ in eV, forces in eV/\xC5, and stress tensors in kilobar."
