  /materials/core/find_structure/:
    post:
      tags:
      - Materials
      summary: Post FindStructure documents
      operationId: search_materials_core_find_structure__post
      parameters:
      - name: ltol
        in: query
        required: false
        schema:
          type: number
          description: Fractional length tolerance. Default is 0.2.
          default: 0.2
          title: Ltol
        description: Fractional length tolerance. Default is 0.2.
      - name: stol
        in: query
        required: false
        schema:
          type: number
          description: Site tolerance. Defined as the fraction of the average free                     length
            per atom := ( V / Nsites ) ** (1/3). Default is 0.3.
          default: 0.3
          title: Stol
        description: Site tolerance. Defined as the fraction of the average free                     length
          per atom := ( V / Nsites ) ** (1/3). Default is 0.3.
      - name: angle_tol
        in: query
        required: false
        schema:
          type: number
          description: Angle tolerance in degrees. Default is 5 degrees.
          default: 5
          title: Angle Tol
        description: Angle tolerance in degrees. Default is 5 degrees.
      - name: _limit
        in: query
        required: false
        schema:
          type: integer
          description: Maximum number of matches to show. Defaults to 1, only showing
            the best match.
          default: 1
          title: ' Limit'
        description: Maximum number of matches to show. Defaults to 1, only showing
          the best match.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Dictionary representaion of Pymatgen structure object to
                query with
              title: Structure
      responses:
        '200':
          description: Post FindStructure data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response_FindStructure_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
