          description: List of deprecation tags detailing why this document isn't
            valid.
        last_updated:
          type: string
          format: date-time
          title: Last Updated
          description: Timestamp for the most recent calculation update for this property.
        origins:
          anyOf:
          - items:
              $ref: '#/components/schemas/PropertyOrigin'
            type: array
          - type: 'null'
          title: Origins
          description: Dictionary for tracking the provenance of properties.
        warnings:
          items:
            type: string
          type: array
          title: Warnings
          description: Any warnings related to this property.
          default: []
        property_name:
          type: string
          title: Property Name
          default: robocrys
        description:
          type: string
          title: Description
          description: Description text from robocrytallographer.
        condensed_structure:
          $ref: '#/components/schemas/CondensedStructureData'
          description: Condensed structure data from robocrytallographer.
        robocrys_version:
          type: string
          title: Robocrys Version
          description: The version of Robocrystallographer used to generate this document.
          default: 0.86.4rc4
      type: object
      required:
      - description
      - condensed_structure
